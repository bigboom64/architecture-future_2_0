<svg width="1360" height="1620" viewBox="0 0 680 810" xmlns="http://www.w3.org/2000/svg" style="background:#FFFFFF;font-family:sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITLE -->
<text font-size="15" font-weight="bold" fill="#1a1a1a" x="340" y="14" text-anchor="middle">Локальная автоматизация с Terraform и Docker — диаграмма развёртывания</text>

<!-- ══ ZONE 1: ВНЕ TERRAFORM ══ -->
<rect x="30" y="20" width="620" height="174" rx="16" fill="none" stroke="#854F0B" stroke-width="0.8" stroke-dasharray="6 4"/>
<text font-size="14" font-weight="bold" fill="#854F0B" x="46" y="42">Вне Terraform</text>
<text font-size="12" fill="#854F0B" x="46" y="60">Инициируют выполнение, не управляются как ресурс</text>

<!-- Source code -->
<rect x="50" y="74" width="240" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text font-size="14" font-weight="bold" fill="#633806" x="170" y="97" text-anchor="middle">Исходный код</text>
<text font-size="12" fill="#854F0B" x="170" y="115" text-anchor="middle">app/ + Dockerfile + main.tf</text>

<!-- CI/CD -->
<rect x="390" y="74" width="240" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text font-size="14" font-weight="bold" fill="#633806" x="510" y="97" text-anchor="middle">CI/CD pipeline</text>
<text font-size="12" fill="#854F0B" x="510" y="115" text-anchor="middle">GitHub Actions / GitLab CI</text>

<!-- Terraform CLI bridge -->
<rect x="240" y="152" width="200" height="26" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text font-size="14" font-weight="bold" fill="#633806" x="340" y="165" text-anchor="middle">Terraform CLI</text>

<!-- Source → CLI -->
<path d="M170 130 L170 158 L240 165" fill="none" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="12" fill="#854F0B" x="174" y="148">terraform apply</text>
<!-- CI → CLI -->
<path d="M510 130 L510 158 L440 165" fill="none" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="12" fill="#854F0B" x="420" y="148">plan / apply</text>

<!-- ══ ZONE 2: УПРАВЛЯЕТСЯ TERRAFORM ══ -->
<rect x="30" y="214" width="620" height="556" rx="16" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="8 4"/>
<text font-size="14" font-weight="bold" fill="#185FA5" x="46" y="236">Управляется Terraform</text>
<text font-size="12" fill="#185FA5" x="46" y="254">Ресурсы, описанные в main.tf и создаваемые через Docker provider</text>

<!-- CLI → zone -->
<line x1="340" y1="178" x2="340" y2="214" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="12" fill="#185FA5" x="344" y="200">создаёт ресурсы</text>

<!-- Docker network -->
<rect x="50" y="270" width="260" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
<text font-size="14" font-weight="bold" fill="#0C447C" x="180" y="292" text-anchor="middle">Docker network</text>
<text font-size="12" fill="#185FA5" x="180" y="310" text-anchor="middle">project-env-net (bridge)</text>

<!-- Docker volume -->
<rect x="370" y="270" width="260" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
<text font-size="14" font-weight="bold" fill="#0C447C" x="500" y="292" text-anchor="middle">Docker volume</text>
<text font-size="12" fill="#185FA5" x="500" y="310" text-anchor="middle">project-env-db-data</text>

<!-- Docker Engine container -->
<rect x="50" y="360" width="580" height="386" rx="14" fill="none" stroke="#0C447C" stroke-width="0.6" stroke-dasharray="5 3"/>
<text font-size="14" font-weight="bold" fill="#0C447C" x="66" y="382">Docker Engine</text>
<text font-size="12" fill="#0C447C" x="66" y="400">Среда выполнения контейнеров на локальной машине</text>

<!-- App container -->
<rect x="70" y="416" width="240" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text font-size="14" font-weight="bold" fill="#085041" x="190" y="444" text-anchor="middle">Контейнер: App</text>
<text font-size="12" fill="#0F6E56" x="190" y="462" text-anchor="middle">Python HTTP server</text>
<text font-size="12" fill="#0F6E56" x="190" y="480" text-anchor="middle">порт 8080 → 8080</text>

<!-- DB container -->
<rect x="370" y="416" width="240" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text font-size="14" font-weight="bold" fill="#085041" x="490" y="444" text-anchor="middle">Контейнер: PostgreSQL</text>
<text font-size="12" fill="#0F6E56" x="490" y="462" text-anchor="middle">postgres:15-alpine</text>
<text font-size="12" fill="#0F6E56" x="490" y="480" text-anchor="middle">порт 5432 (внутренний)</text>

<!-- Env App -->
<rect x="70" y="536" width="240" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" fill="#2C2C2A" x="190" y="558" text-anchor="middle">Env-переменные (App)</text>
<text font-size="12" fill="#5F5E5A" x="190" y="576" text-anchor="middle">DB_HOST=db, DB_PORT=5432</text>

<!-- Env DB -->
<rect x="370" y="536" width="240" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" fill="#2C2C2A" x="490" y="558" text-anchor="middle">Env-переменные (DB)</text>
<text font-size="12" fill="#5F5E5A" x="490" y="576" text-anchor="middle">POSTGRES_DB, USER, PASSWORD</text>

<!-- Healthcheck -->
<rect x="70" y="622" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" fill="#2C2C2A" x="190" y="640" text-anchor="middle">Healthcheck (DB)</text>
<text font-size="12" fill="#5F5E5A" x="190" y="658" text-anchor="middle">pg_isready каждые 10 с</text>

<!-- Volume mount -->
<rect x="370" y="622" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" fill="#2C2C2A" x="490" y="640" text-anchor="middle">Монтирование тома</text>
<text font-size="12" fill="#5F5E5A" x="490" y="658" text-anchor="middle">/var/lib/postgresql/data</text>

<!-- ══ CONNECTIONS ══ -->
<!-- Network → App -->
<path d="M180 326 L180 384 L190 416" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#378ADD" x="142" y="372">подключён</text>
<!-- Network → DB -->
<path d="M500 326 L500 384 L490 416" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#378ADD" x="504" y="372">подключён</text>
<!-- Volume → mount -->
<path d="M500 326 L500 344 L610 344 L610 644" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<!-- App → DB runtime -->
<path d="M310 461 L370 461" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#1D9E75" x="316" y="450">SQL / TCP 5432</text>
<!-- containers → env -->
<line x1="190" y1="506" x2="190" y2="536" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="490" y1="506" x2="490" y2="536" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
<!-- DB → mount -->
<line x1="490" y1="592" x2="490" y2="622" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
<!-- App → healthcheck -->
<line x1="190" y1="592" x2="190" y2="622" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- LEGEND -->
<line x1="40" y1="786" x2="76" y2="786" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#1a1a1a" x="82" y="790">Terraform назначает ресурс</text>
<line x1="240" y1="786" x2="276" y2="786" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="12" fill="#1a1a1a" x="282" y="790">Соединение в runtime</text>
<line x1="430" y1="786" x2="466" y2="786" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
<text font-size="12" fill="#1a1a1a" x="472" y="790">Конфигурация контейнера</text>
</svg>
