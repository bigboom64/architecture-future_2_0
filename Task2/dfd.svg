<svg width="1360" height="1200" viewBox="0 0 680 1200" xmlns="http://www.w3.org/2000/svg" style="background:#FFFFFF;font-family:sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text font-size="15" font-weight="bold" fill="#1a1a1a" x="340" y="14" text-anchor="middle">Data Flow Diagram — Логические потоки данных между доменами (Будущее 2.0)</text>

<!-- EXTERNAL ACTORS -->
<rect x="20" y="20" width="130" height="52" rx="8" fill="#F1F1F1" stroke="#888" stroke-width="0.8"/>
<text font-size="13" font-weight="bold" fill="#2C2C2A" x="85" y="42" text-anchor="middle">Врач / Пациент</text>
<text font-size="11" fill="#5F5E5A" x="85" y="60" text-anchor="middle">Внешний актор</text>

<rect x="270" y="20" width="140" height="52" rx="8" fill="#F1F1F1" stroke="#888" stroke-width="0.8"/>
<text font-size="13" font-weight="bold" fill="#2C2C2A" x="340" y="42" text-anchor="middle">Партнёр — Фарма</text>
<text font-size="11" fill="#5F5E5A" x="340" y="60" text-anchor="middle">Внешний актор</text>

<rect x="530" y="20" width="140" height="52" rx="8" fill="#F1F1F1" stroke="#888" stroke-width="0.8"/>
<text font-size="13" font-weight="bold" fill="#2C2C2A" x="600" y="42" text-anchor="middle">Партнёр — Устройства</text>
<text font-size="11" fill="#5F5E5A" x="600" y="60" text-anchor="middle">Внешний актор</text>

<!-- Actor arrows -->
<line x1="85" y1="72" x2="85" y2="138" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#444" x="88" y="108">Запись на приём</text>
<line x1="340" y1="72" x2="340" y2="388" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#444" x="343" y="370">Каталог препаратов</text>
<line x1="600" y1="72" x2="600" y2="388" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="11" fill="#444" x="524" y="370">Телеметрия IoT</text>

<!-- CLINIC DOMAIN -->
<rect x="12" y="130" width="260" height="190" rx="14" fill="none" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="6 3"/>
<text font-size="13" font-weight="bold" fill="#185FA5" x="22" y="151">Clinic domain</text>
<text font-size="11" fill="#185FA5" x="22" y="167">Управление клин. процессами</text>
<rect x="22" y="176" width="232" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#0C447C" x="138" y="200" text-anchor="middle">Приём и запись на приём</text>
<rect x="22" y="224" width="232" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#0C447C" x="138" y="248" text-anchor="middle">Ведение медкарты (EMR)</text>
<rect x="22" y="272" width="232" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#0C447C" x="138" y="296" text-anchor="middle">Выписка рецептов и направлений</text>
<text font-size="11" fill="#5F5E5A" x="138" y="330" text-anchor="middle">Меняется независимо: расписание,</text>
<text font-size="11" fill="#5F5E5A" x="138" y="344" text-anchor="middle">шаблоны EMR, интеграция с ЕГИСЗ</text>

<!-- FINTECH DOMAIN -->
<rect x="408" y="130" width="260" height="190" rx="14" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="6 3"/>
<text font-size="13" font-weight="bold" fill="#0F6E56" x="418" y="151">Fintech domain</text>
<text font-size="11" fill="#0F6E56" x="418" y="167">Фин. операции и взаиморасчёты</text>
<rect x="418" y="176" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#085041" x="538" y="200" text-anchor="middle">Процессинг платежей</text>
<rect x="418" y="224" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#085041" x="538" y="248" text-anchor="middle">Формирование счетов и актов</text>
<rect x="418" y="272" width="240" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#085041" x="538" y="296" text-anchor="middle">Регуляторная отчётность</text>
<text font-size="11" fill="#5F5E5A" x="538" y="330" text-anchor="middle">Меняется независимо: тарифы,</text>
<text font-size="11" fill="#5F5E5A" x="538" y="344" text-anchor="middle">интеграции с банками, НДС-логика</text>

<!-- DATA PLATFORM DOMAIN -->
<rect x="140" y="390" width="390" height="370" rx="16" fill="none" stroke="#533AB7" stroke-width="1" stroke-dasharray="8 4"/>
<text font-size="13" font-weight="bold" fill="#533AB7" x="335" y="414" text-anchor="middle">Data Platform domain</text>
<text font-size="11" fill="#533AB7" x="335" y="430" text-anchor="middle">Интеграция, хранение и подготовка данных — бизнес-логика доменов здесь не реализуется</text>
<rect x="200" y="442" width="270" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="335" y="461" text-anchor="middle">Шина событий (Event Bus / Kafka)</text>
<text font-size="11" fill="#534AB7" x="335" y="477" text-anchor="middle">Транспорт всех входящих событий</text>
<rect x="200" y="498" width="270" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="335" y="517" text-anchor="middle">Сырое хранилище (Data Lake)</text>
<text font-size="11" fill="#534AB7" x="335" y="533" text-anchor="middle">Все события без изменений</text>
<rect x="200" y="554" width="270" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="335" y="573" text-anchor="middle">Контроль качества (DQ)</text>
<text font-size="11" fill="#534AB7" x="335" y="589" text-anchor="middle">Полнота, форматы, дубли</text>
<rect x="200" y="610" width="270" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="335" y="629" text-anchor="middle">Слой обработки (DWH)</text>
<text font-size="11" fill="#534AB7" x="335" y="645" text-anchor="middle">Очистка и обогащение данных</text>
<rect x="200" y="666" width="270" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="335" y="685" text-anchor="middle">Витрины данных (Data Marts)</text>
<text font-size="11" fill="#534AB7" x="335" y="701" text-anchor="middle">Агрегаты по доменам и периодам</text>

<!-- Internal platform arrows -->
<line x1="335" y1="486" x2="335" y2="498" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="335" y1="542" x2="335" y2="554" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="335" y1="598" x2="335" y2="610" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="335" y1="654" x2="335" y2="666" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- AI SERVICES DOMAIN -->
<rect x="140" y="786" width="390" height="190" rx="14" fill="none" stroke="#993C1D" stroke-width="0.8" stroke-dasharray="6 3"/>
<text font-size="13" font-weight="bold" fill="#993C1D" x="335" y="808" text-anchor="middle">AI Services domain</text>
<text font-size="11" fill="#993C1D" x="335" y="824" text-anchor="middle">Обучение и инференс моделей</text>
<rect x="152" y="834" width="200" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#712B13" x="252" y="858" text-anchor="middle">Обучение (batch pipeline)</text>
<rect x="364" y="834" width="154" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#712B13" x="441" y="858" text-anchor="middle">Инференс и прогнозы</text>
<rect x="152" y="884" width="366" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/>
<text font-size="13" font-weight="bold" fill="#712B13" x="335" y="908" text-anchor="middle">Управление версиями моделей (Model Registry)</text>
<text font-size="11" fill="#5F5E5A" x="335" y="940" text-anchor="middle">Меняется независимо: алгоритмы, A/B-тесты,</text>
<text font-size="11" fill="#5F5E5A" x="335" y="954" text-anchor="middle">дообучение — без изменений схем DWH и Clinic</text>

<!-- CROSS-DOMAIN FLOWS -->
<!-- Clinic EMR → Event Bus -->
<path d="M138 244 L138 390 Q138 420 160 430 L200 442" fill="none" stroke="#185FA5" stroke-width="1.3" marker-end="url(#arrow)"/>
<text font-size="11" fill="#185FA5" x="22" y="400">Клин. события</text>
<text font-size="11" fill="#185FA5" x="22" y="414">(диагноз, анализы)</text>

<!-- Clinic prescriptions → Event Bus -->
<path d="M138 292 L138 320 L175 350 L185 420 L200 442" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
<text font-size="11" fill="#185FA5" x="22" y="450">Рецепты</text>
<text font-size="11" fill="#185FA5" x="22" y="464">(МНН, дозировка)</text>

<!-- Clinic → Fintech (услуги) -->
<path d="M254 196 L408 196" fill="none" stroke="#0F6E56" stroke-width="1.3" marker-end="url(#arrow)"/>
<text font-size="11" fill="#0F6E56" x="280" y="188">Оказанные услуги</text>
<text font-size="11" fill="#0F6E56" x="280" y="202">(код, пациент, дата)</text>

<!-- Fintech → Event Bus -->
<path d="M538 316 L538 360 L530 380 Q520 400 490 420 L470 442" fill="none" stroke="#0F6E56" stroke-width="1.3" marker-end="url(#arrow)"/>
<text font-size="11" fill="#0F6E56" x="500" y="350">Подтверждённые</text>
<text font-size="11" fill="#0F6E56" x="500" y="364">транзакции</text>

<!-- Data Marts → Fintech -->
<path d="M470 680 L520 680 Q580 680 580 320" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
<text font-size="11" fill="#0F6E56" x="590" y="500">Финансовые срезы</text>
<text font-size="11" fill="#0F6E56" x="590" y="514">(выручка по услугам)</text>

<!-- Data Marts → AI training -->
<path d="M335 710 L335 786" fill="none" stroke="#993C1D" stroke-width="1.3" marker-end="url(#arrow)"/>
<text font-size="11" fill="#993C1D" x="338" y="748">Обучающие датасеты</text>
<text font-size="11" fill="#993C1D" x="338" y="762">(анонимизир., размеченные)</text>

<!-- AI inference → Clinic EMR -->
<path d="M441 834 L441 780 Q441 760 420 740 Q400 720 140 240 L138 244" fill="none" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
<text font-size="11" fill="#993C1D" x="6" y="572">Вероятность диагноза,</text>
<text font-size="11" fill="#993C1D" x="6" y="586">маркеры риска →</text>
<text font-size="11" fill="#993C1D" x="6" y="600">в медкарту</text>

<!-- AI inference → Event Bus → Pharma -->
<path d="M441 834 L441 820 Q441 800 450 780 L460 740 L470 500 L470 464" fill="none" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
<text font-size="11" fill="#993C1D" x="476" y="600">Рекомендации по</text>
<text font-size="11" fill="#993C1D" x="476" y="614">препаратам →</text>
<text font-size="11" fill="#993C1D" x="476" y="628">в шину → к Фарме</text>

<!-- AI → Устройства -->
<path d="M518 854 L600 854 L600 72" fill="none" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
<text font-size="11" fill="#993C1D" x="593" y="854" text-anchor="end">Корректировки</text>
<text font-size="11" fill="#993C1D" x="593" y="868" text-anchor="end">параметров устройств</text>

<!-- LEGEND -->
<rect x="20" y="1030" width="640" height="140" rx="10" fill="none" stroke="#ccc" stroke-width="0.8"/>
<text font-size="13" font-weight="bold" fill="#1a1a1a" x="340" y="1052" text-anchor="middle">Легенда</text>
<line x1="40" y1="1075" x2="100" y2="1075" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="11" fill="#1a1a1a" x="108" y="1079">Клинические потоки</text>
<line x1="40" y1="1100" x2="100" y2="1100" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="11" fill="#1a1a1a" x="108" y="1104">Финансовые потоки</text>
<line x1="40" y1="1125" x2="100" y2="1125" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="11" fill="#1a1a1a" x="108" y="1129">Потоки AI / модели</text>
<line x1="260" y1="1075" x2="320" y2="1075" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="11" fill="#1a1a1a" x="328" y="1079">Входные данные от акторов</text>
<line x1="260" y1="1100" x2="320" y2="1100" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-size="11" fill="#1a1a1a" x="328" y="1104">Обратный / асинхронный поток</text>
<rect x="260" y="1114" width="54" height="20" rx="4" fill="none" stroke="#533AB7" stroke-width="0.8" stroke-dasharray="5 3"/>
<text font-size="11" fill="#1a1a1a" x="328" y="1129">Контейнер домена</text>
</svg>
